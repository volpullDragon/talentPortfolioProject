{# Edit Job Listing template. #}
{% extends "home/base.html" %}
{% block title %}Talented Bank - Edit Job Listing{% endblock %}

{% block content %}
<div class="settings-page">
  <header class="settings-header">
    <div class="settings-header-content">
      <div class="settings-header-icon"><i class="bi bi-pencil-square"></i></div>
      <h1>Edit Job Listing</h1>
      <p>Update your listing details and publish changes</p>
    </div>
  </header>

  <div class="settings-container">
    <section class="settings-card">
      <form method="post" class="settings-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary settings-submit-btn"><i class="bi bi-check2"></i><span>Save Changes</span></button>
        <a href="{% url 'faculty-profile' %}" class="btn btn-secondary settings-submit-btn"><i class="bi bi-arrow-left"></i><span>Cancel</span></a>
      </form>
    </section>
  </div>
</div>
{% endblock %}
