{% load static %}
<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags--> 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'global.css' %}">


<title>{% block title %}Talented Bank - Reset Complete{% endblock %} </title>
</head>
<body class="auth-page">
    <main class="main-container auth-main-container">
        <div class="container auth-container my-3 p-3">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <div class="card shadow-lg border-0 rounded-lg mt-0 mb-3">
                        <div class="alert alert-info">
                            Your password has been set. You may go ahead and <a href="{% url 'login' %}">Login Here</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="{% static 'global.js' %}"></script>

<!-- A plugin for password show/hide  -->
<script src="https://unpkg.com/bootstrap-show-password@1.2.1/dist/bootstrap-show-password.min.js"></script>

</body>
</html>
